$kind: http-request
name: Register
method: POST
url: '{{baseUrl}}/api/auth/register'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "{{randomEmail}}",
      "password": "password123"
    }
scripts:
  - type: preRequest
    language: text/javascript
    code: |-
      const randomId = pm.variables.replaceIn('{{$guid}}');
      pm.collectionVariables.set("randomEmail", `user_${randomId}@example.com`);
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 201", () => pm.response.to.have.status(201));
      postman.setNextRequest("Login");
