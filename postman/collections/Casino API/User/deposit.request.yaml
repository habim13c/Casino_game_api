$kind: http-request
name: Deposit
method: POST
url: '{{baseUrl}}/api/user/deposit'
order: 2000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "amount": 100
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is 200", () => pm.response.to.have.status(200));
      const json = pm.response.json();
      pm.test("Balance updated correctly", () => {
        const previousBalance = pm.collectionVariables.get("balance") || 0;
        const depositAmount = JSON.parse(pm.request.body.raw).amount;
        pm.expect(Math.floor(json.balance)).to.eql(Math.floor(previousBalance + depositAmount));
        pm.collectionVariables.set("balance", json.balance);
      });
      postman.setNextRequest("Slot - Place Bet");
